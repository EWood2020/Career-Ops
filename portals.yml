# ─── SCORING WEIGHTS ────────────────────────────────────────────────────────

scoring_weights:
  role_fit: 0.25
  company_fit: 0.15
  location: 0.15
  compensation: 0.15
  growth_potential: 0.15
  autonomy: 0.10
  side_work_compatible: 0.05

# ─── AGENT NOTES ────────────────────────────────────────────────────────────

agent_notes: >
  DO NOT evaluate or generate CVs for engineering roles (Python, ML, RAG, etc.).
  Score below 3.0 and skip.

  Business-side AI transformation is the target. Ask of every role: "Is the
  primary job organizational change + AI strategy, or building the model?"
  If building the model — reject it.

  LinkedIn is the highest volume channel — 8K+ results for AI + Europe.
  Use tight title filters. Prioritize roles posted in last 7 days.

  Lisbon/Portugal roles get a +0.5 location bonus.
  Roles prohibiting independent consulting: flag prominently, do not auto-reject.

  Regulated industries (pharma, energy, finance) = credibility advantage.
  Lead with MSD + Quint Group when tailoring for these sectors.
