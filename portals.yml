# portals.yml — Enrique Wood Rivero
# Career-Ops portal scanner configuration
# Focus: AI Transformation, Digital Strategy, Senior PM (AI/Platform), Consulting
# Geography: Prague primary | Lisbon/Portugal secondary | Remote Europe

# ─── TITLE FILTERS ──────────────────────────────────────────────────────────

