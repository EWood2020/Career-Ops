    - "AI Strategy"
    - "AI Enablement"
    - "AI Governance"
    - "AI Program"
    - "Head of AI"
    - "AI Lead"
    - "Decision Intelligence"
    - "Applied AI"
    - "Digital Transformation"
    - "Digital Strategy"
    - "Technology Strategy"
    - "Operating Model"
    - "Strategy Consultant"
    - "Technology Consultant"
    - "Management Consultant"
    - "Transformation Consultant"
    - "Product Strategy"
    - "Senior Product Manager"
    - "Market Business Technologist"
    - "Business Technologist"
    - "AI Consultant"
    - "Automation Consultant"

  negative:
    - "ML Engineer"
    - "Machine Learning Engineer"
    - "Data Scientist"
    - "Python Developer"
