    - "Software Engineer"
    - "RAG"
    - "LLM Engineer"
    - "Prompt Engineer"
    - "Data Engineer"
    - "Analytics Engineer"
    - "Junior"
    - "Graduate"
    - "Intern"

# ─── JOB BOARDS ─────────────────────────────────────────────────────────────

job_boards:

  # ── Tier 1: Highest signal ────────────────────────────────────────────────

  - name: "LinkedIn Jobs"
    url: "https://www.linkedin.com/jobs/search/?keywords=AI+transformation+consultant&location=Europe&f_WT=2"
    notes: >
      8K results for AI + Europe. Best volume. Use with tight title filters.
      Remote filter (f_WT=2) reduces noise significantly.
    priority: critical

  - name: "Wellfound (AngelList)"
    url: "https://wellfound.com/jobs"
    notes: "Best for AI-native scale-ups in Europe. Filter to Business/Strategy, not engineering."
    priority: high

  - name: "Workable"
    url: "https://jobs.workable.com"
    notes: "Strong in Czech Republic and Portugal. Many consulting and strategy roles."
    priority: high

  - name: "Jobs.cz"
    url: "https://www.jobs.cz"
    notes: "Primary Czech board. Prague roles. Filter English-language positions."
    priority: high

  - name: "Jobgether"
    url: "https://www.jobgether.com"
    notes: "Hybrid and remote. Strong EU coverage including Portugal. Good Lisbon pipeline."
    priority: high

  # ── Tier 2: Remote-first ──────────────────────────────────────────────────

  - name: "Remote.com"
    url: "https://remote.com/jobs"
    notes: "Global remote. Filter to Europe timezone. Strategy and consulting roles exist."
    priority: medium-high

  - name: "Remotive"
    url: "https://remotive.io"
    notes: "Curated remote. Check Business/Management category specifically."
    priority: medium-high

  - name: "We Work Remotely"
    url: "https://weworkremotely.com"
    notes: "Long-standing remote board. Management and strategy section."
    priority: medium-high

  - name: "Europe Remotely"
    url: "https://europeremotely.com"
    notes: "EU remote roles specifically. Good for Lisbon-compatible remote positions."
    priority: medium-high

  - name: "Working Nomads"
    url: "https://www.workingnomads.com"
    notes: "Remote jobs, good European coverage. Management and consulting."
    priority: medium

  - name: "NoDesk"
    url: "https://nodesk.co"
    notes: "Curated remote. Lower volume, higher quality. Weekly scan."
    priority: medium

  - name: "Arc.dev"
    url: "https://arc.dev"
    notes: "Remote jobs European presence. Tech-adjacent strategy roles."
    priority: medium

  # ── Tier 3: Czech Republic and Central Europe ─────────────────────────────

  - name: "StartupJobs.cz"
    url: "https://www.startupjobs.cz/en"
    notes: "Czech startup and scale-up jobs. English filter. Faster hiring cycles."
    priority: medium

  - name: "Grafton CZ"
    url: "https://www.grafton.cz/en"
    notes: "Recruiter-listed roles in Czech Republic. Enterprise and consulting."
    priority: medium-low

  - name: "People Place"
    url: "https://www.peopleplace.eu"
    notes: "EU-focused staffing. Technology and consulting roles."
    priority: medium-low

  - name: "Monster Lounge"
    url: "https://www.monsterlounge.cz"
    notes: "English-language jobs in Czech Republic. Local supplement."
    priority: medium-low

  # ── Tier 4: Niche / worth checking ───────────────────────────────────────

  - name: "Escape the City"
    url: "https://www.escapethecity.org"
    notes: "Purpose-driven roles. Transformation/advisory at mission-driven companies."
    priority: low-medium

  - name: "Glassdoor"
    url: "https://www.glassdoor.com/Job/jobs.htm"
    notes: "Use for company research and salary benchmarking. Not primary search."
    priority: research-only

