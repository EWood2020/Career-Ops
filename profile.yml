# ─── WHAT GOOD FIT LOOKS LIKE ───────────────────────────────────────────────
# The agent should score high when a role has these signals.

fit_signals_positive:
  - Role is on the business side of AI, not purely engineering
  - Requires translating complex tech to non-technical stakeholders
  - Involves organizational change, adoption, or transformation
  - Mentions LEAN, ITIL, governance, operating model, or process
  - Consulting or advisory context — internal or external
  - Cross-functional alignment or stakeholder management required
  - Strategic + hands-on execution combination valued
  - Multinational or regulated environment (pharma, energy, enterprise)
  - Based in Prague OR remote-friendly in Europe OR Lisbon/Portugal area

fit_signals_negative:
  - Requires deep Python / ML framework expertise (PyTorch, TensorFlow, etc.)
  - Primarily a coding / engineering build role
  - No business stakeholder interaction
  - Pure data science or statistical modeling
  - Requires STEM degree as hard filter with no exceptions

